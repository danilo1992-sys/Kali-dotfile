# --- IMPORTAR TEMA ---
include ./solarized_osaka_dark.conf

# --- Transparencia (Debe ir en el principal para sobreescribir) ---
background_opacity 0.85
dynamic_background_opacity yes

# --- Configuración de Ventana y Pestañas ---
remember_window_size  no
initial_window_width  1000
initial_window_height 650
window_padding_width  10

tab_bar_edge            bottom
tab_bar_style           slant 
tab_powerline_style     slanted
tab_activity_symbol     none

# --- Atajos de Portapapeles ---
copy_on_select yes
map ctrl+c copy_and_clear_or_interrupt
map ctrl+v paste_from_clipboard

# --- Paneles Divididos (Splits) ---
enabled_layouts splits
map ctrl+alt+h launch --location=hsplit
map ctrl+alt+v launch --location=vsplit
map alt+left neighboring_window left
map alt+right neighboring_window right
map alt+up neighboring_window up
map alt+down neighboring_window down

# --- Navegación entre Pestañas ---

# Crear y cerrar pestañas (opcional pero recomendado)
map ctrl+t       new_tab
map ctrl+q       close_tab

# Navegar con Ctrl + Tab y Ctrl + Shift + Tab
map ctrl+tab        next_tab
map ctrl+shift+tab  previous_tab

# Navegar usando Alt + Número (Alt+1, Alt+2, etc.)
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6

# Cambiar el título de la pestaña (por si quieres organizarte mejor)
map ctrl+alt+r set_tab_title

# Tamaño de fuente (en puntos)
font_size 14

# Habilitar el layout de divisiones
enabled_layouts splits, stack

# Crear divisiones con Ctrl + Shift + Enter (o tus propios atajos)
# Dividir horizontalmente (el panel queda abajo)
map ctrl+alt+h launch --location=hsplit --cwd=current

# Dividir verticalmente (el panel queda a la derecha)
map ctrl+alt+v launch --location=vsplit --cwd=current

# --- Navegación entre paneles ---
# Usando Alt + Flechas (muy intuitivo)
map alt+left neighboring_window left
map alt+right neighboring_window right
map alt+up neighboring_window up
map alt+down neighboring_window down

# --- Organizar paneles ---
# Rotar los paneles actuales
map ctrl+shift+r layout_action rotate

# Hacer que el panel actual ocupe toda la pantalla (Zoom)
# Presiona de nuevo para volver al diseño dividido
map ctrl+alt+z toggle_layout stack

update_check_interval 0
