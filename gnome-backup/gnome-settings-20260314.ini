left-box-order=['LogoMenu', 'activities', 'clipboardIndicator', 'dash', 'apps-menu']
right-box-order=['appindicator-kstatusnotifieritem-ulauncher', 'lilypad@shendrew.github.io', 'vpn-ip-address-indicator', 'tiling-assistant@leleat-on-github', 'drive-menu', 'appindicator-kstatusnotifieritem-Xwayland Video Bridge_pipewireToXProxy', 'screenRecording', 'screenSharing', 'dwellClick', 'a11y', 'keyboard', 'quickSettings']

[org/gnome/shell/extensions/user-theme]
name='Osaka-Dark'

[org/gtk/gtk4/settings/color-chooser]
